<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YuGiOh Card Maker</title>
  <!--
    Official YuGiOh fonts — download from:
    https://github.com/lauqerm/ygocarder/tree/main/public/asset/font
    Place .woff/.woff2/.ttf files in assets/fonts/
    Without them, Cinzel / Palatino are used as fallbacks.
  -->
  <style>
    @font-face {
      font-family: 'MatrixRegularSmallCaps';
      src: url('assets/fonts/MatrixRegularSmallCaps.ttf') format('truetype');
      font-weight: normal; font-style: normal;
    }
    @font-face {
      font-family: 'MatrixBoldSmallCaps';
      src: url('assets/fonts/MatrixBoldSmallCaps.woff2') format('woff2'),
           url('assets/fonts/MatrixBoldSmallCaps.woff')  format('woff');
      font-weight: bold; font-style: normal;
    }
    @font-face {
      font-family: 'MatrixBook';
      src: url('assets/fonts/MatrixBook.ttf') format('truetype');
      font-weight: normal; font-style: normal;
    }
    @font-face {
      font-family: 'YuGiOhITCStoneSerifBSc';
      src: url('assets/fonts/YuGiOhITCStoneSerifBSc.ttf') format('truetype');
      font-weight: normal; font-style: normal;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <h1>YuGiOh Card Maker</h1>

    <div class="auth-area">
      <!-- Nicht eingeloggt -->
      <div id="auth-signed-out" class="auth-signed-out">
        <button id="btn-login" class="btn-auth">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign in with Google
        </button>
      </div>
      <!-- Eingeloggt -->
      <div id="auth-signed-in" class="auth-signed-in hidden">
        <img id="user-avatar" class="user-avatar" src="" alt="Avatar" />
        <span id="user-name" class="user-name"></span>
        <button id="btn-my-cards" class="btn-auth btn-auth-secondary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
          My Cards
        </button>
        <button id="btn-logout" class="btn-auth btn-auth-ghost">Sign out</button>
      </div>
    </div>
  </header>

  <main class="editor-layout">

    <!-- ── Left: Card Preview ── -->
    <section class="preview-panel">
      <div class="canvas-wrapper">
        <canvas id="card-canvas" width="421" height="614"></canvas>
      </div>
    </section>

    <!-- ── Right: Controls ── -->
    <section class="controls-panel">

      <!-- col1 = Identity/Type/Stats/LinkArrows, col2 = MonsterDetails/SubType/CardText, col3 = LinkRating/Artwork -->
      <div class="main-section">

        <div class="main-col">
          <!-- Card Identity -->
          <div class="control-group">
            <h3 class="group-title">Card Identity</h3>
            <div class="field">
              <label for="card-name">Card Name</label>
              <input type="text" id="card-name" placeholder="Enter card name…" />
            </div>
          </div>

          <!-- Card Type -->
          <div class="control-group">
            <h3 class="group-title">Card Type</h3>
            <div class="field">
              <label for="card-type">Template</label>
              <select id="card-type"></select>
            </div>
            <div class="field">
              <label for="card-attribute">Attribute</label>
              <select id="card-attribute"></select>
            </div>
          </div>

          <!-- Stats -->
          <div class="control-group" id="stats-group">
            <h3 class="group-title">Stats</h3>
            <div class="stats-row">
              <div class="field">
                <label for="card-atk">ATK</label>
                <input type="text" id="card-atk" placeholder="0–9999 or ?" maxlength="5" />
              </div>
              <div class="field" id="def-field">
                <label for="card-def">DEF</label>
                <input type="text" id="card-def" placeholder="0–9999 or ?" maxlength="5" />
              </div>
            </div>
          </div>

          <!-- Link Arrows -->
          <div class="control-group" id="link-group">
            <h3 class="group-title">Link Arrows</h3>
            <p class="group-hint">Click to toggle active arrows</p>
            <div id="link-arrows-grid" class="link-arrows-grid"></div>
          </div>
        </div><!-- /.main-col -->

        <div class="main-col">
          <!-- Monster Details -->
          <div class="control-group" id="monster-details">
            <h3 class="group-title">Monster Details</h3>
            <div class="field">
              <label for="monster-type">Monster Type</label>
              <select id="monster-type"></select>
            </div>
            <div class="field" id="level-group">
              <label for="card-level" id="level-label">Level</label>
              <input type="number" id="card-level" min="1" max="12" value="4" />
            </div>
          </div>

          <!-- Spell sub-type -->
          <div class="control-group" id="spell-subtype-group">
            <h3 class="group-title">Spell Type</h3>
            <div class="field">
              <label for="spell-subtype">Sub-Type</label>
              <select id="spell-subtype"></select>
            </div>
          </div>

          <!-- Trap sub-type -->
          <div class="control-group" id="trap-subtype-group">
            <h3 class="group-title">Trap Type</h3>
            <div class="field">
              <label for="trap-subtype">Sub-Type</label>
              <select id="trap-subtype"></select>
            </div>
          </div>

          <!-- Effect / Flavor Text -->
          <div class="control-group">
            <h3 class="group-title">Card Text</h3>
            <div class="field">
              <label for="card-effect">Effect / Flavor Text</label>
              <textarea id="card-effect" rows="5" placeholder="Enter card effect or flavor text…"></textarea>
            </div>
          </div>
        </div><!-- /.main-col -->

        <div class="main-col">
          <!-- Link Rating -->
          <div class="control-group" id="link-rating-group">
            <h3 class="group-title">Link Rating</h3>
            <div class="field">
              <label for="link-rating">Link Rating</label>
              <input type="number" id="link-rating" min="1" max="8" value="2" />
            </div>
          </div>

          <!-- Artwork Upload -->
          <div class="control-group">
            <h3 class="group-title">Artwork</h3>
            <input type="file" id="art-upload" accept="image/*" style="display:none" />
            <div class="field">
              <div id="drop-zone" class="drop-zone">
                <span class="drop-label">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <path d="m21 15-5-5L5 21"/>
                  </svg>
                  <span>Click or drag image here</span>
                </span>
              </div>
            </div>
          </div>
        </div><!-- /.main-col -->

      </div><!-- /.main-section -->

    </section>
  </main>

  <!-- ── Footer / Download ── -->
  <footer class="app-footer">
    <!-- Save-Bereich (nur sichtbar wenn eingeloggt) -->
    <div id="save-area" class="save-area hidden">
      <button id="btn-save" class="btn-download btn-save">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>
        </svg>
        Save Card
      </button>
      <div class="save-separator"></div>
    </div>

    <span class="footer-hint">Download your card:</span>
    <button id="btn-png" class="btn-download">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download PNG
    </button>
    <button id="btn-jpg" class="btn-download btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download JPG
    </button>
  </footer>

  <!-- ── My Cards Modal ── -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">My Saved Cards</h2>
        <div class="modal-header-actions">
          <button id="btn-new-collection" class="btn-new-collection">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New Collection
          </button>
          <button id="modal-close" class="modal-close" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="cards-loading" class="cards-loading hidden">Loading…</div>
      <div id="cards-empty" class="cards-empty hidden">Noch keine gespeicherten Karten.</div>
      <div id="cards-content" class="cards-content"></div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast"></div>

  <!-- Firebase SDKs (compat, kein Bundler nötig) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App scripts loaded in dependency order -->
  <script src="js/constants.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/downloader.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
